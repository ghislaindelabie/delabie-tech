# Dependabot config — opens PRs to bump dependencies.
# Scope for this repo:
#  - github-actions: weekly; keeps SHA-pinned third-party actions current.
#  - bundler (Ruby): monthly; bump gems respecting ~> constraints in Gemfile.
#  - npm (Node): monthly; dev-only for Playwright.
# [SEC-7].
#
# Policy: major-version bumps are ignored across all three ecosystems and
# evaluated manually. Actions' majors often ship breaking changes (node
# runtime, API surface, default permissions); we SHA-pinned intentionally.
# Minor and patch bumps flow automatically via weekly/monthly PRs.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ruby"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
