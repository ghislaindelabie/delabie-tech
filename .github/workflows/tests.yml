name: Tests

# --------------------------------------------------------------------------
# Review policy (as of 2026-04-23, solo-mode):
# Code review + Security review run LOCALLY (see CLAUDE.md "Local review
# workflow"), not in CI. CI here runs only deterministic checks: build,
# structural invariants, link check, Playwright.
#
# The Claude Review + Claude Security Review + review-gate jobs that used
# to live in this file were removed in the PR that simplified to solo-mode.
# Reactivate by reverting that commit when any of these triggers hits:
#   - A second human contributor joins the project.
#   - The project goes public / open-source.
#   - Pre-cutover safety pass before production flip (plan §5.9).
# The preserved helper `scripts/ci/review-gate.sh` is still in the tree
# so reactivation is a one-revert + branch-protection update.
# --------------------------------------------------------------------------

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# [SEC-8] Workflow-level default is read-only; each job that needs write
# permissions (PR comments, deploy-pages, OIDC) declares them explicitly.
permissions:
  contents: read

jobs:
  build-and-check:
    name: Build + structural + links + Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # [SEC-7] Third-party actions pinned by commit SHA (not tag).
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Install Playwright browsers
        # Phase 0 ships chromium only; webkit/iPad matrix added in later phases.
        run: npx playwright install --with-deps chromium

      - name: Jekyll build
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace

      - name: Structural tests (RSpec)
        run: bundle exec rspec tests/structural --format documentation

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # --root-dir resolves root-relative URLs like "/about/" to local files under _site.
          # --offline skips HTTP requests (fast, deterministic).
          args: --no-progress --offline --root-dir ${{ github.workspace }}/_site _site/
          fail: true

      - name: Playwright E2E (against built site)
        run: npm run test:e2e:local

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
