name: Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# [SEC-8] Workflow-level default is read-only; each job that needs write
# permissions (PR comments, deploy-pages, OIDC) declares them explicitly.
# Least-privilege default for the build-and-check job.
permissions:
  contents: read

jobs:
  build-and-check:
    name: Build + structural + links + Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Inherits the read-only workflow-level permissions.
    steps:
      - name: Checkout
        # [SEC-7] Third-party actions pinned by commit SHA (not tag).
        # Tag-to-commit resolution is mutable; SHA is immutable. Dependabot
        # will open PRs to bump these via the github-actions ecosystem.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Install Playwright browsers
        # Phase 0 ships chromium only; webkit/iPad matrix added in later phases.
        run: npx playwright install --with-deps chromium

      - name: Jekyll build
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace

      - name: Structural tests (RSpec)
        run: bundle exec rspec tests/structural --format documentation

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # --root-dir resolves root-relative URLs like "/about/" to local files under _site.
          # --offline skips HTTP requests (fast, deterministic).
          args: --no-progress --offline --root-dir ${{ github.workspace }}/_site _site/
          fail: true

      - name: Playwright E2E (against built site)
        run: npm run test:e2e:local

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Claude Review — code-quality review (conventions, bugs, test quality).
  # Runs in PARALLEL with Claude Security Review (see that job's comment for
  # the coordination mechanism).
  # ---------------------------------------------------------------------------
  claude-review:
    name: Claude Review (Opus 4.7)
    runs-on: ubuntu-latest
    needs: build-and-check
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Pick review model (Opus by default, Sonnet if label present)
        id: model
        # Fast-track opt-down: add the label `review:sonnet` to a PR to run
        # both Claude jobs on Sonnet 4.6 instead of Opus 4.7. Useful for
        # docs-only / typo / frontmatter PRs where Opus depth is overkill.
        # Default stays Opus for substantive PRs.
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'review:sonnet') }}" == "true" ]]; then
            echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
            echo "label=Sonnet 4.6" >> "$GITHUB_OUTPUT"
          else
            echo "model=claude-opus-4-7" >> "$GITHUB_OUTPUT"
            echo "label=Opus 4.7" >> "$GITHUB_OUTPUT"
          fi
          echo "Using: $(grep model= "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Claude code review (${{ steps.model.outputs.label }})
        uses: anthropics/claude-code-action@59e5b24f8332f1feda2f9d9a52aaa464b048644e # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model ${{ steps.model.outputs.model }}
            --max-turns 10
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a code review of this PR for the delabie-tech site (see CLAUDE.md for conventions).
            Focus on:
            - Bugs, regressions, anti-patterns
            - Unclear names, brittle tests, overly content-specific assertions (tests must be template-level per CLAUDE.md)
            - Violations of the plan conventions in CHIRPY_MIGRATION_PLAN.md (look for it in the parent repo or referenced sections)
            - Security-adjacent issues that would normally be caught by the dedicated Security Review

            **Tag every finding** you want tracked with a unique ID like [REVIEW-1], [REVIEW-2], ...
            Ghislain's review-gate CI check parses these tags; every tag must be answered (in a later commit that quotes the tag, or in a reply comment).

            Post top-level feedback with `gh pr comment`; use inline comments for code-specific issues.
            Do not submit review text as chat messages — only GitHub comments count.

  # ---------------------------------------------------------------------------
  # Claude Security Review — runs in PARALLEL with claude-review, with a 90s
  # stagger to offset the token-heavy phase. Rationale: the Anthropic org-level
  # 30k input-tokens-per-minute rate limit on Opus is shared across concurrent
  # jobs. Observed in PR #2's first run: two simultaneously-started Opus reviews
  # 429'd. Staggering ~90s shifts the peak-token window of this job into a
  # different minute bucket from claude-review's peak-token window, so they
  # coexist under the rate limit while still finishing in ~max(review_time)
  # wall-clock instead of review_time + security_time sequential.
  # ---------------------------------------------------------------------------
  claude-security-review:
    name: Claude Security Review (Opus 4.7)
    runs-on: ubuntu-latest
    needs: build-and-check
    timeout-minutes: 18
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      id-token: write
    steps:
      - name: Offset peak-token window (90s stagger — see job comment)
        run: sleep 90

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Pick review model (Opus by default, Sonnet if label present)
        id: model
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'review:sonnet') }}" == "true" ]]; then
            echo "model=claude-sonnet-4-6" >> "$GITHUB_OUTPUT"
            echo "label=Sonnet 4.6" >> "$GITHUB_OUTPUT"
          else
            echo "model=claude-opus-4-7" >> "$GITHUB_OUTPUT"
            echo "label=Opus 4.7" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude security review (${{ steps.model.outputs.label }})
        uses: anthropics/claude-code-action@59e5b24f8332f1feda2f9d9a52aaa464b048644e # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model ${{ steps.model.outputs.model }}
            --max-turns 10
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Security review of this PR. Tight scope: review the DIFF only,
            plus its direct dependencies (files imported/included/required by
            the changed files). Do not re-scan the full repo. This is a Jekyll
            static site (Chirpy theme): no server-side code, no user auth, no
            user data.

            ## Check-list (apply only those relevant to the diff)
            - Secrets in committed files (`.env`, tokens, API keys, GA tokens)
            - New workflow permissions — flag any `write` scope added
            - New dependencies (Gemfile / package.json) — supply-chain risk, pinning
            - New third-party scripts / CDN refs — SRI, integrity
            - Hook-bypass paths in any `scripts/hooks/*` or `.claude/settings.json` change
            - New Liquid template attribute interpolation without `| escape` / `| xml_escape`
            - New user-input surfaces (forms, query params, postMessage)

            ## OWASP top-10 items that apply to a static site
            - A05 Security Misconfiguration
            - A06 Vulnerable and Outdated Components
            - A08 Software and Data Integrity Failures

            Rate severity: CRITICAL | HIGH | MEDIUM | LOW | NONE.
            Tag every finding with [SEC-1], [SEC-2], ... — the review-gate parses these.
            Post findings via `gh pr comment` (top-level) and inline comments.

            At the end, post a single summary comment titled "## Security Review Summary"
            with: (1) what was reviewed, (2) security-relevant decisions, (3) risks
            accepted with rationale, (4) recommended follow-ups. This summary comment
            IS the security decision document for this PR (no separate file needed).

  review-gate:
    name: Review gate (findings answered)
    runs-on: ubuntu-latest
    needs: [claude-review, claude-security-review]
    timeout-minutes: 5
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check findings are answered
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/ci/review-gate.sh
