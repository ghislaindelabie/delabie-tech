# ----------------------------------------------------------
# delabie.tech — Chirpy migration (v2 test site)
# ----------------------------------------------------------

theme: jekyll-theme-chirpy

lang: en
timezone: Europe/Paris

title: Ghislain Delabie
tagline: AI engineer building data infrastructure for mobility, science, media and energy
description: >-
  Personal site of Ghislain Delabie — AI Solutions lead at Alien Intelligence,
  connecting AI agents to premium knowledge sources.

url: "https://v2.delabie.tech"
baseurl: ""

github:
  username: ghislaindelabie

social:
  name: Ghislain Delabie
  email: ghislain@alien.club
  links:
    - https://github.com/ghislaindelabie
    - https://www.linkedin.com/in/ghislaindelabie

# ---- Appearance ----
theme_mode: # left blank for user toggle
img_cdn: ""
avatar: ""
toc: true

# ---- Comments (OFF in v1 per §9.3.c) ----
comments:
  provider: ""

# ---- Analytics (picked in Phase 5 per §9.3.a) ----
analytics:
  plausible:
    domain:

# ---- Pageviews ----
pageviews:
  provider: ""

# ---- Preview-site SEO precaution — §3.8.5 ----
robots_noindex: true

# ---- Paginate ----
paginate: 10

# ---- Pages ----
# Path-scoped defaults address [REVIEW-12 @ 07:01]: Jekyll applies defaults
# in the order they appear; specific path scopes override broader ones.
# Files under fr/ or matching *.fr.md get lang: fr by default, so a future
# contributor who forgets to set `lang:` in a new FR post doesn't silently
# ship it as EN-under-/fr/.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      lang: en
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
      lang: en
  # FR overrides
  - scope:
      path: "fr"
      type: posts
    values:
      lang: fr
  - scope:
      path: "**/*.fr.md"
    values:
      lang: fr
  # Activity collection defaults
  - scope:
      path: ""
      type: activity
    values:
      lang: en
  - scope:
      path: "**/*.fr.md"
      type: activity
    values:
      lang: fr
  # Case-study collection defaults
  - scope:
      path: ""
      type: case_studies
    values:
      layout: case_study
      lang: en
  - scope:
      path: "**/*.fr.md"
      type: case_studies
    values:
      lang: fr

# ---- Build ----
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order
  # Phase 2 — case studies (see CHIRPY_MIGRATION_PLAN.md §3.2, §5.3).
  # Renamed from `projects` to `case_studies` to signal the content model
  # shift (professional case studies vs. generic project cards).
  case_studies:
    output: true
    sort_by: date_start
    permalink: /case-studies/:slug/
  # Phase 3 — short-form activity updates surfaced on the homepage's
  # "Recent Activity" section (see plan §3.1, §5.4). One file per update.
  # Not published individually (output: false) — entries are aggregated
  # into the home layout only.
  activity:
    output: false
    sort_by: date

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
  - node_modules
  - tests
  - scripts
  - playwright-report
  - playwright-results
  - .github
  - .claude
  - CLAUDE.md
  - CHIRPY_MIGRATION_PLAN.md

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
